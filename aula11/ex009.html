<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Países</title>
</head>
<body>
    <h1>Brasileiro ou estrangeiro?</h1>
    <input type="text" id="txtpais" autocomplete="off" min="3">
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res"></div>
    

    <script>
        
        function verificar() {

            var txtp = document.querySelector('input#txtpais')
            var res = document.querySelector('div#res')

            var pais = txtp.value.toUpperCase()


             if (pais == 'BRASIL') {
                res.innerHTML = (`Voce é brasileiro!`)
                res.innerHTML += ` <img src="https://static.todamateria.com.br/upload/ba/nd/bandeira-do-brasil-og.jpg" alt="Bandeira do Brasil" width="200">`
            } else {
            res.innerHTML = (`Voce é estrangeiro!`)
            res.innerHTML += `<img src ="https://img.freepik.com/vetores-gratis/passaporte-com-passagens-aereas-em-fundo-branco_1308-90416.jpg?semt=ais_hybrid&w=740&q=80" alt="Passaporte" width="200">`
            }
        }

    //    value é oq o usuario digitou
    </script>
</body>
</html>
