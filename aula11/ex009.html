<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Países</title>
</head>
<body>
    <h1>Brasileiro ou estrangeiro?</h1>
    <input type="text" id="txtpais">
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res"></div>

    <script>
        
        function verificar() {

            var txtp = document.querySelector('input#txtpais')
            var res = document.querySelector('div#res')

            var pais = txtp.value.toUpperCase()


             if (pais == 'BRASIL') {
                res.innerHTML = (`Voce é brasileiro!`)
            } else {
            res.innerHTML = (`Voce é estrangeiro!`)
            }
        }

    //    value é oq o usuario digitou
    </script>
</body>
</html>
